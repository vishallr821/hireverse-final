{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
    <div class="mb-12">
        <h1 class="text-3xl font-extrabold mb-6 text-white tracking-tight">DSA Challenges</h1>
        
        <!-- Filter Bar -->
        <div class="flex flex-col md:flex-row gap-6 justify-between items-start md:items-center bg-[#1A1D24] p-5 rounded-2xl border border-gray-800 shadow-sm">
            <div class="flex flex-wrap gap-2" id="difficulty-filters">
                <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-semibold bg-teal-500/20 text-teal-400 border border-teal-500/40 transition-colors" data-diff="all">All</button>
                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white border border-transparent transition-colors" data-diff="beginner">Beginner</button>
                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white border border-transparent transition-colors" data-diff="intermediate">Intermediate</button>
                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white border border-transparent transition-colors" data-diff="advanced">Advanced</button>
            </div>
            
            <div class="flex flex-wrap gap-2 items-center" id="category-filters">
                <span class="px-2 py-1 text-sm font-medium text-gray-500 uppercase tracking-wider">Categories</span>
                <span class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-300 transition-colors cursor-pointer">Arrays</span>
                <span class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-300 transition-colors cursor-pointer">Strings</span>
                <span class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-300 transition-colors cursor-pointer">DP</span>
                <span class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-300 transition-colors cursor-pointer">Graphs</span>
                <span class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-300 transition-colors cursor-pointer">Sorting</span>
                <span class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-900 border border-gray-800 text-gray-400 hover:text-gray-300 transition-colors cursor-pointer">Binary Search</span>
            </div>
        </div>
    </div>

    <!-- Problems Grid -->
    <div id="problems-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-20 animate-fade-in">
        <!-- Loader Skeleton -->
        <div class="col-span-full py-20 flex justify-center items-center gap-3 text-gray-500">
            <svg class="animate-spin h-6 w-6 text-teal-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="font-medium animate-pulse">Loading amazing challenges...</span>
        </div>
    </div>


</div>

<style>
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<script>
    let allProblems = [];
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', async () => {
        await fetchProblems();
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.className = "filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white border border-transparent transition-colors";
                });
                const target = e.target;
                target.className = "filter-btn active px-4 py-2 rounded-lg text-sm font-semibold bg-teal-500/20 text-teal-400 border border-teal-500/40 transition-colors";
                
                currentFilter = target.getAttribute('data-diff');
                renderProblems();
            });
        });
    });

    async function fetchProblems() {
        try {
            const res = await fetch('/dsa/problems');
            if (res.ok) {
                allProblems = await res.json();
                renderProblems();
            } else {
                showError('problems-grid', 'Failed to load problems from server.');
            }
        } catch (e) {
            showError('problems-grid', 'Network error while fetching problems.');
        }
    }

    function getDifficultyColor(diff) {
        if (diff === 'beginner') return 'text-green-400 bg-green-500/10 border-green-500/20 ring-1 ring-green-500/30';
        if (diff === 'intermediate') return 'text-blue-400 bg-blue-500/10 border-blue-500/20 ring-1 ring-blue-500/30';
        if (diff === 'advanced') return 'text-purple-400 bg-purple-500/10 border-purple-500/20 ring-1 ring-purple-500/30';
        return 'text-gray-400 bg-gray-500/10 border-gray-500/20 ring-1 ring-gray-500/30';
    }

    function formatCategory(cat) {
        return cat.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    function renderProblems() {
        const grid = document.getElementById('problems-grid');
        grid.innerHTML = '';
        
        const filtered = currentFilter === 'all' 
            ? allProblems 
            : allProblems.filter(p => p.difficulty === currentFilter);
            
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full py-16 text-center text-gray-500 border-2 border-dashed border-gray-800 rounded-2xl">No problems match your filters.</div>';
            return;
        }

        filtered.forEach(p => {
            const diffColor = getDifficultyColor(p.difficulty);
            
            const card = document.createElement('div');
            card.className = "group bg-[#1A1D24] rounded-2xl border border-gray-800 p-6 flex flex-col hover:border-teal-500/50 hover:bg-[#1f222b] transition-all duration-300 shadow-lg hover:shadow-teal-900/10 hover:-translate-y-1 cursor-default relative overflow-hidden";
            
            // Add a subtle gradient accent line at the top of the card
            card.innerHTML = `
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${p.difficulty === 'beginner' ? 'from-green-500 to-emerald-400' : p.difficulty === 'intermediate' ? 'from-blue-500 to-indigo-400' : 'from-purple-500 to-pink-400'} opacity-50 group-hover:opacity-100 transition-opacity"></div>
                <div class="mb-5 flex-grow mt-2">
                    <div class="flex justify-between items-start mb-4">
                        <span class="capitalize text-xs font-bold px-2.5 py-1 rounded-md ${diffColor}">${p.difficulty}</span>
                        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest bg-gray-900 border border-gray-800 px-2 py-1 rounded-md shadow-sm">${formatCategory(p.category)}</span>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 leading-snug group-hover:text-teal-400 transition-colors">${p.title}</h3>
                </div>
                <div class="mt-auto pt-5 border-t border-gray-800/60">
                    <a href="/dsa/challenge/${p.id}" class="inline-flex items-center justify-center w-full py-2.5 px-4 bg-[#0F1117] group-hover:bg-teal-600 border border-gray-700 group-hover:border-teal-500 text-gray-300 group-hover:text-white text-sm font-bold rounded-xl transition duration-300 shadow-sm">
                        Solve Challenge
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </a>
                </div>
            `;
            grid.appendChild(card);
        });
    }


    function showError(elementId, msg) {
        document.getElementById(elementId).innerHTML = `<div class="col-span-full py-12 text-center text-red-400 font-medium">${msg}</div>`;
    }
</script>
{% endblock %}
